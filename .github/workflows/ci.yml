name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run check-types
      - run: bun run build
      - run: bun run test
      - name: Install OpenCode CLI
        run: |
          npm install -g opencode-ai@1.4.6
          ln -sf "$(which opencode)" /usr/local/bin/opencode-cli
      - name: Build E2E
        run: node esbuild.e2e.js
      - name: E2E Tests
        run: xvfb-run -a node out/test/e2e/runTest.js
      - name: Build Smoke Tests
        run: node esbuild.smoke.js
      - name: Smoke Tests
        run: xvfb-run -a node out/test/smoke/run.js

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: "*.vsix"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: vsix
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
